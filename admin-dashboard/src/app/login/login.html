<div class="page">

  <div class="header">
    <img src="/logo.png" width="250" alt="SmartWinnr Logo" />
  </div>

  <div class="card">

    <div class="tabs">
      <a class="tab-link active">Login</a>
      <a routerLink="/register" class="tab-link">Register</a>
    </div>

    <form (ngSubmit)="handleLogin($event)">

      <div class="field-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <div class="forgot-row">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit">Sign In</button>

      <p class="register-hint">
        Don't have an account? <a routerLink="/register">Create one here</a>
      </p>

    </form>

  </div>

</div>
