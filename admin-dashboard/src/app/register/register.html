<div class="page">

  <div class="header">
    <img src="/logo.png" width="250" alt="SmartWinnr Logo" />
  </div>

  <div class="card">

    <div class="tabs">
      <a routerLink="/login" class="tab-link">Login</a>
      <a class="tab-link active">Register</a>
    </div>

    <form (ngSubmit)="handleRegister($event)">

      <div class="field-group">
        <label for="name">Full Name</label>
        <input
          id="name"
          type="text"
          [(ngModel)]="name"
          name="name"
          placeholder="Enter your full name"
          required
        />
      </div>

      <div class="field-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Create a password"
          required
        />
      </div>

      <div class="field-group">
        <label for="role">Role</label>
        <select id="role" [(ngModel)]="role" name="role">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button type="submit">Create Account</button>

      <p class="login-hint">
        Already have an account? <a routerLink="/login">Sign in here</a>
      </p>

    </form>

  </div>

</div>
